version: "3.9"

services:
  npu-stress-test:
    image: rk3566-npu-stress:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rk3566-npu-stress
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Grant access to the Rockchip NPU and GPU devices.
    # Remove / comment out lines you don't need when running in simulation mode.
    devices:
      - /dev/dri:/dev/dri         # Mali GPU / RKNPU device node (common path)
    privileged: true              # Required to access /sys/kernel/debug/rknpu/*
    environment:
      - MODEL_PATH=/app/models/resnet18_for_rk3566_rk3568.rknn
    volumes:
      # Expose the host's debugfs so /sys/kernel/debug/rknpu/load is readable
      # inside the container (required for NPU utilisation monitoring).
      # The entrypoint script also tries to mount debugfs automatically when
      # this bind-mount is absent, but having both is the most robust setup.
      - /sys/kernel/debug:/sys/kernel/debug:ro
      # Optional: persist logs / results outside the container
      - npu_results:/app/results
      # Optional: if librknnrt.so was not baked into the image at build time,
      # map it from the host (download from
      # https://github.com/airockchip/rknn-toolkit2/tree/master/rknpu2/runtime/Linux/librknn_api/aarch64):
      #- /usr/lib/librknnrt.so:/usr/lib/librknnrt.so

volumes:
  npu_results:
